<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Registration // RGF 2025</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #000000;
            --bg-secondary: #0a0a0a;
            --bg-card: #0d0d0d;
            --text-primary: #f5f5f5;
            --text-secondary: #a0a0a0;
            --text-muted: #555555;
            --accent-gold: #d4af37;
            --accent-copper: #b87333;
            --border-subtle: #1a1a1a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #000000;
            color: var(--text-primary);
            min-height: 100vh;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 0% 0%, rgba(212, 175, 55, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 100% 100%, rgba(184, 115, 51, 0.06) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 120px 20px 60px;
            position: relative;
            z-index: 1;
        }

        .page-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .page-label {
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.4em;
            color: var(--accent-gold);
            margin-bottom: 15px;
        }

        .page-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            font-weight: 600;
        }

        .back-link {
            display: inline-block;
            padding: 12px 25px;
            background: transparent;
            border: 1px solid var(--border-subtle);
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s;
            margin-bottom: 30px;
        }

        .back-link:hover {
            border-color: var(--accent-gold);
            color: var(--accent-gold);
        }

        .form-section {
            background: #0a0a0a;
            border: 1px solid var(--border-subtle);
            padding: 35px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            display: block;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .form-input {
            width: 100%;
            padding: 15px;
            background: #0d0d0d;
            border: 1px solid var(--border-subtle);
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-gold);
        }

        .form-buttons {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .save-btn, .cancel-btn {
            flex: 1;
            padding: 15px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            text-align: center;
        }

        .save-btn {
            background: transparent;
            border: 1px solid var(--accent-gold);
            color: var(--accent-gold);
        }

        .save-btn:hover {
            background: var(--accent-gold);
            color: #000000;
        }

        .cancel-btn {
            background: transparent;
            border: 1px solid var(--border-subtle);
            color: var(--text-secondary);
        }

        .cancel-btn:hover {
            border-color: #ff4444;
            color: #ff4444;
        }

        .messages {
            margin-bottom: 25px;
        }

        .messages div {
            padding: 15px 20px;
            font-size: 0.9rem;
        }

        .messages .error {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid #ff4444;
            color: #ff4444;
        }

        @media (max-width: 768px) {
            .container {
                padding: 100px 15px 40px;
            }

            .form-section {
                padding: 25px;
            }

            .form-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <a href="{% url 'viewreg' %}" class="back-link">← Back to Registrations</a>

    <div class="page-header">
        <p class="page-label">Admin Panel</p>
        <h1 class="page-title">Edit Registration</h1>
    </div>

    {% if messages %}
    <div class="messages">
        {% for message in messages %}
        <div class="{% if message.tags %}{{ message.tags }}{% endif %}">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <div class="form-section">
        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label class="form-label" for="name">Full Name</label>
                <input type="text" id="name" name="name" value="{{ registration.name }}" class="form-input" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input type="email" id="email" name="email" value="{{ registration.email }}" class="form-input" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" value="{{ registration.phone }}" class="form-input" required>
            </div>

            <div class="form-buttons">
                <button type="submit" class="save-btn">Save Changes</button>
                <a href="{% url 'viewreg' %}" class="cancel-btn">Cancel</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
