<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EVENTS // Discover</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #000000;
      --bg-secondary: #0a0a0a;
      --bg-card: #0d0d0d;
      --bg-elevated: #141414;
      --text-primary: #f5f5f5;
      --text-secondary: #a0a0a0;
      --text-muted: #555555;
      --accent-gold: #d4af37;
      --accent-copper: #b87333;
      --accent-sage: #9caf88;
      --accent-burgundy: #722f37;
      --border-subtle: #1a1a1a;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #000000;
      color: var(--text-primary);
      min-height: 100vh;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(ellipse at 0% 0%, rgba(212, 175, 55, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 100% 100%, rgba(184, 115, 51, 0.06) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .bg-texture {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      opacity: 0.03;
      pointer-events: none;
      z-index: 0;
    }

    .hero {
      text-align: center;
      padding: 100px 20px 60px;
      position: relative;
      z-index: 1;
      background: #000000;
    }

    .hero-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.4em;
      color: var(--accent-gold);
      margin-bottom: 20px;
      opacity: 0;
      animation: fadeInUp 0.8s ease forwards;
    }

    .hero-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3rem, 10vw, 6rem);
      font-weight: 600;
      line-height: 1.1;
      margin-bottom: 25px;
      opacity: 0;
      animation: fadeInUp 0.8s ease 0.2s forwards;
    }

    .hero-title .accent {
      font-style: italic;
      color: var(--accent-gold);
    }

    .hero-desc {
      font-size: 1.1rem;
      color: var(--text-secondary);
      max-width: 500px;
      margin: 0 auto;
      line-height: 1.7;
      opacity: 0;
      animation: fadeInUp 0.8s ease 0.4s forwards;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 40px 100px;
      position: relative;
      z-index: 1;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 40px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border-subtle);
    }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 500;
    }

    .section-count {
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .categories {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 30px;
    }

    .category-card {
      background: #0a0a0a;
      border: 1px solid #151515;
      padding: 40px 35px;
      cursor: pointer;
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .category-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, rgba(212, 175, 55, 0.05) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.5s;
    }

    .category-card:hover {
      transform: translateY(-8px);
      border-color: var(--accent-gold);
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
    }

    .category-card:hover::before {
      opacity: 1;
    }

    .back-btn {
      display: inline-block;
      padding: 12px 25px;
      background: transparent;
      border: 1px solid var(--border-subtle);
      color: var(--text-secondary);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      text-decoration: none;
      transition: all 0.3s;
      margin-bottom: 30px;
    }

    .back-btn:hover {
      border-color: var(--accent-gold);
      color: var(--accent-gold);
    }

    .category-icon {
      width: 60px;
      height: 60px;
      margin-bottom: 25px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border-subtle);
      position: relative;
    }

    .category-icon svg {
      width: 28px;
      height: 28px;
    }

    .category-icon::before {
      content: '';
      position: absolute;
      top: -3px;
      left: -3px;
      right: -3px;
      bottom: -3px;
      border: 1px solid var(--accent-gold);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .category-card:hover .category-icon::before {
      opacity: 0.3;
    }

    .category-card:hover .category-icon {
      border-color: var(--accent-gold);
    }

    .category-card:hover .category-icon svg {
      stroke: var(--accent-gold);
    }

    .category-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 500;
      margin-bottom: 12px;
      transition: color 0.3s;
    }

    .category-card:hover .category-name {
      color: var(--accent-gold);
    }

    .category-desc {
      font-size: 0.95rem;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    .category-events {
      margin-top: 25px;
      font-size: 0.85rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .category-events span {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      background: #141414;
      border-radius: 50%;
      font-size: 0.75rem;
    }

    .category-arrow {
      position: absolute;
      bottom: 35px;
      right: 35px;
      font-size: 1.2rem;
      opacity: 0;
      transform: translateX(-10px);
      transition: all 0.3s;
      color: var(--accent-gold);
    }

    .category-card:hover .category-arrow {
      opacity: 1;
      transform: translateX(0);
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.98);
      display: none;
      justify-content: center;
      align-items: flex-start;
      z-index: 1000;
      overflow-y: auto;
      padding: 60px 20px;
    }

    .overlay.active {
      display: flex;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .overlay-content {
      max-width: 1200px;
      width: 100%;
      position: relative;
    }

    .overlay-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 50px;
    }

    .overlay-title-wrap {
      position: relative;
    }

    .overlay-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 600;
      margin-bottom: 10px;
    }

    .overlay-subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      color: var(--text-secondary);
      font-style: italic;
    }

    .close-btn {
      background: #0a0a0a;
      color: var(--text-primary);
      border: 1px solid #1a1a1a;
      padding: 15px 30px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s;
    }

    .close-btn:hover {
      background: var(--accent-gold);
      color: var(--bg-primary);
      border-color: var(--accent-gold);
    }

    .events-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 25px;
    }

    .event-card {
      background: #0a0a0a;
      border: 1px solid #151515;
      padding: 0;
      transition: all 0.4s ease;
      overflow: hidden;
    }

    .event-card:hover {
      transform: translateY(-5px);
      border-color: var(--accent-copper);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    }

    .event-image {
      width: 100%;
      height: 180px;
      object-fit: cover;
      transition: transform 0.5s ease;
    }

    .event-card:hover .event-image {
      transform: scale(1.05);
    }

    .event-image-wrap {
      overflow: hidden;
      position: relative;
    }

    .event-image-wrap::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 50%;
      background: linear-gradient(transparent, #000000);
    }

    .event-info {
      padding: 25px;
    }

    .event-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      font-weight: 500;
      margin-bottom: 5px;
    }

    .event-desc {
      font-size: 0.85rem;
      color: var(--text-secondary);
      line-height: 1.5;
      margin-bottom: 10px;
    }

    .event-price {
      font-size: 1.1rem;
      color: var(--accent-copper);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .event-price-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .event-price-icon {
      width: 18px;
      height: 18px;
      stroke: var(--accent-copper);
    }

    .register-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 30px;
      background: transparent;
      border: 1px solid var(--accent-gold);
      color: var(--accent-gold);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
      text-decoration: none;
    }

    .register-btn:hover {
      background: var(--accent-gold);
      color: var(--bg-primary);
    }

    .main-btn-wrap {
      text-align: center;
      position: relative;
      z-index: 1;
      margin-top: 60px;
    }

    .main-btn {
      display: inline-block;
      padding: 18px 50px;
      background: transparent;
      border: 1px solid var(--accent-gold);
      color: var(--accent-gold);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      text-decoration: none;
      transition: all 0.4s;
    }

    .main-btn:hover {
      background: var(--accent-gold);
      color: var(--bg-primary);
      box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
    }

    .hidden {
      display: none;
    }

    @media (max-width: 768px) {
      .hero {
        padding: 70px 20px 40px;
      }

      .container {
        padding: 0 20px 60px;
      }

      .categories {
        grid-template-columns: 1fr;
        gap: 20px;
      }

      .category-card {
        padding: 30px 25px;
      }

      .overlay-header {
        flex-direction: column;
        gap: 20px;
      }

      .events-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

    };

    const categoryInfo = {
      "Technical": "Push your limits and compete with the best",
      "Cultural": "Express yourself through art and performance",
      "Workshop": "Learn new skills from industry experts",
      "Sports": "Get active and compete in athletic events",
      "Pro-Show": "Experience spectacular professional performances",
      "Start-Up": "Connect with innovators and investors"
    };

    let categoriesData = [];
    const categoryIcons = {
      'cpu': '<path stroke-linecap="round" stroke-linejoin="round" d="M9.75 3.104v5.714a2.25 2.25 0 01-.659 1.591L5 14.5M9.75 3.104c-.251.023-.501.05-.75.082m.75-.082a24.301 24.301 0 014.5 0m0 0v5.714c0 .597.237 1.17.659 1.591L19.8 15.3M14.25 3.104c.251.023.501.05.75.082M19.8 15.3l-1.57.393A9.065 9.065 0 0112 15a9.065 9.065 0 00-6.23-.693L5 14.5m14.8.8l1.402 1.402c1.232 1.165.735 2.85-.394 3.347a9.004 9.004 0 01-5.388-1.093L3.4 15.3" />',
      'palette': '<path stroke-linecap="round" stroke-linejoin="round" d="M9 9l10.5-3m0 6.553v3.75a2.25 2.25 0 01-1.632 2.163l-1.32.377a1.803 1.803 0 11-.99-3.586l2.898-.016a2.25 2.25 0 001.632-2.163zm0 0V2.25L9 5.25v10.303m0 0v3.75a2.25 2.25 0 01-1.632 2.163l-1.32.377a1.803 1.803 0 01-.99-3.586l2.898-.016a2.25 2.25 0 001.632-2.163V9z" />',
      'wrench': '<path stroke-linecap="round" stroke-linejoin="round" d="M11.42 15.17L17.25 21A2.652 2.652 0 0021 17.25l-5.877-5.877M11.42 15.17l2.496-3.03c.317-.384.74-.626 1.208-.766M11.42 15.17l-4.165 2.165a1 1 0 01-.707-.293l7.475-7.425a1.125 1.125 0 011.072-.287c.388.062.735.27.988.605M12 18h.008v.008H12v-.008zm0-3h.008v.008H12v-.008zm0-3h.008v.008H12V9z" />',
      'trophy': '<path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5" />',
      'microphone': '<path stroke-linecap="round" stroke-linejoin="round" d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 01-3-3V4.5a3 3 0 116 0v8.25a3 3 0 01-3 3z" />',
      'rocket': '<path stroke-linecap="round" stroke-linejoin="round" d="M15.59 14.37a6 6 0 01-5.84 7.38v-4.8m5.84-2.58a14.98 14.98 0 006.16-12.12A14.98 14.98 0 009.631 8.41m5.96 5.96a14.926 14.926 0 01-5.841 2.58m-.119-8.54a6 6 0 00-7.381 5.84h4.8m2.581-5.84a14.927 14.927 0 00-2.58 5.84m2.699 2.7c-.103.021-.207.041-.311.06a15.09 15.09 0 01-2.448-2.448 14.9 14.9 0 01.06-.312m-2.24 2.39a4.493 4.493 0 00-1.757 4.306 4.493 4.493 0 004.306-1.758M16.5 9a1.5 1.5 0 11-3 0 1.5 1.5 0 013 0z" />'
    };

    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlayTitle');
    const overlaySubtitle = document.getElementById('overlaySubtitle');
    const eventsGrid = document.getElementById('eventsGrid');
    const closeBtn = document.getElementById('closeBtn');

    async function loadCategories() {
      try {
        const res = await fetch('/api/categories/');
        const data = await res.json();
        categoriesData = data.categories;
        
        const grid = document.getElementById('categoriesGrid');
        grid.innerHTML = categoriesData.map(cat => `
          <div class="category-card" data-category="${cat.name}">
            <div class="category-icon">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                ${categoryIcons[cat.icon] || categoryIcons['cpu']}
              </svg>
            </div>
            <h3 class="category-name">${cat.name}</h3>
            <p class="category-desc">${cat.description || ''}</p>
            <div class="category-events">
              <span>${cat.events.length}</span> events available
            </div>
            <span class="category-arrow">→</span>
          </div>
        `).join('');

        document.getElementById('catCount').textContent = `${categoriesData.length} categories`;
        
        // Re-attach click listeners
        document.querySelectorAll('.category-card').forEach(card => {
          card.addEventListener('click', () => {
            const category = card.dataset.category;
            const catData = categoriesData.find(c => c.name === category);
            overlayTitle.textContent = `${category} Events`;
            overlaySubtitle.textContent = catData ? catData.description : categoryInfo[category] || '';
            renderEvents(category);
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
          });
        });
      } catch (err) {
        console.error('Error loading categories:', err);
      }
    }

    function renderEvents(category) {
      eventsGrid.innerHTML = '';
      const cat = categoriesData.find(c => c.name === category);
      
      if (cat && cat.events.length > 0) {
        cat.events.forEach(event => {
          const card = document.createElement('div');
          card.className = 'event-card';
          card.innerHTML = `
            <div class="event-image-wrap">
              <img src="${event.image || 'https://images.unsplash.com/photo-1540575467063-178a50c2df87?w=400&h=300&fit=crop'}" alt="${event.name}" class="event-image">
            </div>
            <div class="event-info">
              <h4 class="event-name">${event.name}</h4>
              <p class="event-desc">${event.description || 'No description available'}</p>
              <div class="event-price-wrap">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" class="event-price-icon">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v12m-3-2.818l.879.659c1.171.879 3.07.879 4.242 0 1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12c-.725 0-1.45-.22-1.771-.42a2.529 2.529 0 01-.879-.659m0 0L12 10.5m0 0l3 3m-3-3l3-3" />
                </svg>
                <span class="event-price">₹${event.price}</span>
              </div>
              <a href="{% url 'Reg' %}" class="register-btn">Register Now</a>
            </div>
          `;
          eventsGrid.appendChild(card);
        });
      } else {
        eventsGrid.innerHTML = '<p style="color: var(--text-muted); grid-column: 1/-1; text-align: center; padding: 40px;">No events available in this category.</p>';
      }
    }

    closeBtn.addEventListener('click', () => {
      overlay.classList.remove('active');
      document.body.style.overflow = 'auto';
    });

    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) {
        overlay.classList.remove('active');
        document.body.style.overflow = 'auto';
      }
    });

    window.onload = function() {
      loadCategories();
      const role = localStorage.getItem("role");
      if (role === "student") {
        document.getElementById("regbtn").classList.remove("hidden");
      }
    };
  </script>
